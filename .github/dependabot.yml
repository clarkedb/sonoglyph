version: 2
updates:
  # Keeps the SHA-pinned actions in ci.yml fresh (updates the pin and its
  # `# vX.Y.Z` comment together).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore'
    # One PR for all minor/patch bumps; majors still get their own PR.
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
