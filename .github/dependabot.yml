version: 2
updates:
  # Keeps the SHA-pinned actions in ci.yml fresh (updates the pin and its
  # `# vX.Y.Z` comment together).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore'
    # Let updates sit before opening a PR, same rationale as the npm
    # cooldown below. (No semver-major split here: dependabot doesn't
    # support it for the github-actions ecosystem.)
    cooldown:
      default-days: 1

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore'
    # One PR for all minor/patch bumps; majors still get their own PR.
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Matches pnpm's minimum release age: let a version sit for a day (two
    # for majors) before dependabot opens a PR for it.
    cooldown:
      default-days: 1
      semver-major-days: 2
