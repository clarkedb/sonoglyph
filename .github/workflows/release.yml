# Publishing via Changesets: merged PRs carry changeset files; this
# workflow maintains a "Version Packages" PR that accumulates them, and
# publishes to npm (with provenance) when that PR merges. Requires the
# NPM_TOKEN repo secret (an npm automation token for @sonoglyph).
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # push the version branch, create GitHub releases + tags
  pull-requests: write # open/update the Version Packages PR
  id-token: write # npm provenance attestation

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          # Writes the .npmrc that `changeset publish` authenticates with.
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Create version PR or publish to npm
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm release:version
          publish: pnpm release:publish
          # The Version Packages PR title becomes a squash-merge commit
          # subject, so it must carry a conventional-commit prefix (the
          # pr-title workflow enforces it). `commit` matches for the version
          # branch's own commit.
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
