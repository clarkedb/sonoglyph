# Rust lives in its own workflow so TS-only changes don't pay the Rust
# toolchain cost, and Rust-only changes don't spin up the Node pipeline.
# rustup is preinstalled on the runner and provisions the exact toolchain
# (channel + wasm32 target + components) from rust-toolchain.toml.
#
# Path filtering happens inside the `changes` job (dorny/paths-filter), not on
# the workflow's `on:` trigger. A trigger-level `paths:` filter means the
# workflow — and every job's required-status-check context — never reports
# *anything* for a PR that doesn't touch these paths, so a required check
# gets stuck "Expected" forever and blocks merge. Filtering in-job instead
# means the workflow always runs, and `fmt`/`clippy`/`test`/`wasm`/`wasm-pkg`
# plus the `rust` aggregate job (the one branch protection requires) are all
# honestly skipped when irrelevant — GitHub treats a skipped required check
# as satisfied, so this unblocks merge without faking a green pass. `rust`'s
# `if: always() && ...` only overrides the default skip-on-skipped-dependency
# behavior when Rust-relevant changes did land, so a real fmt/clippy/test/
# wasm/wasm-pkg failure still fails `rust` rather than being masked as a skip.
#
# The checks run as parallel jobs (fast fail-in-place, clear signal). `test`
# runs the native cross-validation suite; `wasm` compile-checks the wasm32
# target (fast, wasm-pack-independent); `wasm-pkg` builds @sonoglyph/dsp-wasm
# with wasm-pack and cross-validates it against the TS reference. The `rust`
# job aggregates them, so branch protection can require one check.
name: Rust

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'packages/dsp-wasm/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/rust.yml'

  fmt:
    name: Format
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Provisions the toolchain from rust-toolchain.toml on first invocation.
      - run: rustup show
      # No build cache: rustfmt parses, it doesn't compile.
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test

  wasm:
    name: WASM build
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --target wasm32-unknown-unknown

  # Builds @sonoglyph/dsp-wasm with wasm-pack and cross-validates it against the
  # TS reference. Needs both the Rust toolchain and Node/pnpm.
  wasm-pkg:
    name: WASM package
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sonoglyph/dsp-wasm build:wasm
      - run: pnpm --filter @sonoglyph/dsp-wasm typecheck:wasm
      - run: pnpm exec vitest run packages/dsp-wasm/src/index.test.ts
      # With pkg/ present, build the playground against the real WASM package
      # (ci.yml's build job covers the stub path, where pkg/ is absent).
      - run: pnpm --filter @sonoglyph/playground build

  # Aggregation gate: this is the context branch protection requires. It's
  # honestly *skipped* (not a manufactured pass) when there are no
  # Rust-relevant changes — GitHub treats a skipped required check as
  # satisfied, so branch protection isn't blocked, but the PR's checks list
  # still shows "didn't run" rather than a misleading green checkmark.
  # `always()` overrides the default "skip if a dependency was skipped or
  # failed" behavior *only* when Rust-relevant changes did land, so a real
  # failure in fmt/clippy/test/wasm/wasm-pkg still fails this job instead of
  # being masked as a skip.
  rust:
    name: Rust
    needs: [changes, fmt, clippy, test, wasm, wasm-pkg]
    if: always() && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::one or more Rust jobs failed"
            exit 1
          fi
          echo "fmt, clippy, test, wasm build, and wasm package all passed"
